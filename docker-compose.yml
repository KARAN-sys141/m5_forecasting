version: '3.8'

services:
  backend:
    build: ./backend
    container_name: m5_fastapi_backend
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow

  frontend:
    build: ./frontend
    container_name: m5_ui_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  mlflow:
    image: python:3.10-slim
    container_name: m5_mlflow_server
    ports:
      - "5000:5000"
    command: >
      bash -c "pip install mlflow && mlflow server --host 0.0.0.0 --port 5000"